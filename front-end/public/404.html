<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 페이지</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      font-family: 'Arial', sans-serif;
      background-color: #fff;
      height: 100%;
      color: #000;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #000;
      padding-bottom: 10px;
      margin-bottom: 50px;
    }

    .booth-name {
      font-size: 14px;
      margin-left: 10px;
    }

    .table-btn {
      margin-right: 10px;
      padding: 8px 16px;
      background-color: #ddd;
      border: 1px solid #aaa;
      border-radius: 8px;
      color: #333;
      font-size: 14px;
    }

    .error-content {
      text-align: center;
    }

    .error-content h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .error-content p {
      font-size: 16px;
      margin-bottom: 30px;
      line-height: 1.4;
    }

    .home-btn {
      background-color: #ff7f4f;
      border: none;
      padding: 12px 24px;
      color: white;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0px 2px 4px rgba(0,0,0,0.3);
    }

    .home-btn:hover {
      background-color: #ff6633;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="booth-name">하이 융소</div>
      <button class="table-btn">Table 7</button>
    </header>
    
    <main class="error-content">
      <h1>404</h1>
      <p>요청하신 페이지를<br>찾을 수 없습니다</p>
      <button onclick="goHome()" class="home-btn">처음 화면으로 돌아가기</button>
    </main>
  </div>

  <script>
    function goHome() {
      window.location.href = '/'; // 홈 경로로 설정
    }
  </script>
</body>
</html>
